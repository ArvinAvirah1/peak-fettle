name: Parse sweep

on: [push, pull_request]

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - name: Install mobile deps (for @babel/parser)
        run: npm ci --prefix mobile
      - name: Run parse sweep
        run: node peak-fettle-agents/server/scripts/parse-sweep.js
      - name: Run invariant sweep (local-first + units)
        run: node peak-fettle-agents/server/scripts/invariant-sweep.js
