<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peak Fettle — logo prototypes</title>
<style>
 body{margin:0;padding:32px;font-family:'Helvetica Neue',Arial,sans-serif;background:#f3f4f6;color:#111827}
 h1{font-weight:800;font-size:26px;margin:0 0 4px}
 p.sub{color:#6b7280;margin:0 0 28px;font-size:15px}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
 .card{margin:0;background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
 .stage{display:flex;align-items:center;justify-content:center;height:200px;padding:24px;background:#fff}
 .stage svg{max-width:100%;max-height:100%;height:auto;width:auto}
 figcaption{padding:14px 18px 18px;border-top:1px solid #f1f5f9}
 .cat{display:inline-block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:4px}
 figcaption strong{display:block;font-size:16px;font-weight:700}
 .desc{display:block;font-size:13px;color:#6b7280;margin-top:3px}
</style></head>
<body>
 <h1>Peak Fettle — logo prototypes</h1>
 <p class="sub">16 directions across mountain marks, monograms, wordmarks, and full lockups. Each is an editable SVG in the logos/ folder.</p>
 <div class="grid"><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Peak Fettle double-peak mark">

  <polygon points="320,120 352,166 320,148 290,168" fill="#FFFFFF"/>

  <polygon points="200,188 230,232 200,214 172,234" fill="#FFFFFF"/>

</svg></div><figcaption><span class="cat">Mountain mark</span><strong>Ascent chevrons</strong><span class="desc">Progress / climbing. Greens.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Peak Fettle twin-peak tile mark">

  <rect x="48" y="48" width="416" height="416" rx="96" fill="#4F46E5"/>
  <polygon points="256,150 318,224 194,224" fill="#C7D2FE"/>
  <text x="256" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="220" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-12">PF</text>
</svg></div><figcaption><span class="cat">Monogram</span><strong>PF tile</strong><span class="desc">App-icon initials. Indigo.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Peak Fettle PF outline monogram">

  <polygon points="256,96 300,150 212,150" fill="#111827"/>

  <polygon points="70,72 112,138 28,138" fill="#111827"/>
  <text x="155" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="112" font-weight="700" fill="#111827" text-anchor="start" letter-spacing="-1">Peak Fettle</text>
</svg></div><figcaption><span class="cat">Wordmark</span><strong>Inline wordmark</strong><span class="desc">One line + peak accent. Monochrome.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 210" width="880" height="210" role="img" aria-label="Peak Fettle lowercase rounded wordmark">
  <text x="440" y="148" font-family="'Trebuchet MS','Segoe UI',sans-serif" font-size="124" font-weight="700" fill="#0EA5E9" text-anchor="middle" letter-spacing="-2">peak fettle</text>
</svg></div><figcaption><span class="cat">Wordmark</span><strong>Lowercase rounded</strong><span class="desc">Friendly, approachable. Sky blue.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="1000" height="300" role="img" aria-label="Peak Fettle horizontal combination mark">
  <g transform="translate(40,55) scale(0.37)">
    <polygon points="320,120 480,408 160,408" fill="#13415C"/>
    <polygon points="320,120 352,166 320,148 290,168" fill="#FFFFFF"/>
    <polygon points="200,188 360,408 40,408" fill="#15B8A6"/>
    <polygon points="200,188 230,232 200,214 172,234" fill="#FFFFFF"/>
  </g>
  <text x="278" y="150" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#13415C" letter-spacing="2">PEAK</text>
  <text x="278" y="248" font-family="'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#15B8A6" letter-spacing="2">FETTLE</text>
</svg></div><figcaption><span class="cat">Combination</span><strong>Horizontal lockup</strong><span class="desc">Mark + wordmark side by side.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" width="760" height="600" role="img" aria-label="Peak Fettle vertical badge logo">

  <polygon points="326,224 414,332 234,332" fill="#9CA3AF"/>
  <text x="380" y="520" font-family="'Helvetica Neue', Arial, sans-serif" font-size="78" font-weight="800" fill="#111827" text-anchor="middle" letter-spacing="3">PEAK FETTLE</text>
</svg></div><figcaption><span class="cat">Combination</span><strong>Vertical badge</strong><span class="desc">Stacked badge + name. Monochrome.</span></figcaption></figure><figure class="card"><div class="stage"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" width="760" height="540" role="img" aria-label="Peak Fettle sunrise vertical logo">

  <text x="380" y="470" font-family="'Helvetica Neue', Arial, sans-serif" font-size="76" font-weight="800" fill="#EA580C" text-anchor="middle" letter-spacing="3">PEAK FETTLE</text>
