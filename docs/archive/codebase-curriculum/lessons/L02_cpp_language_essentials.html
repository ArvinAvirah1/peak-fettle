<script id="lesson-sections">
const SECTIONS = [
  {
    title: "Headers and the translation unit",
    html: `
      <p>A C++ <strong>translation unit</strong> is one <code>.cpp</code> file plus every header it pulls in. The compiler reads each one separately, so the same header can be textually included many times within a single build. An <strong>include guard</strong> makes the second-and-later inclusion a no-op.</p>
      <p>Every Peak Fettle header uses the same convention: <code>PEAKFETTLE_&lt;CLASSNAME&gt;_H</code>.</p>
      <h3>The real code</h3>
      <pre><code>// src/UnitPreference.h
#ifndef PEAKFETTLE_UNITPREFERENCE_H
#define PEAKFETTLE_UNITPREFERENCE_H
// ... class definition ...
#endif // PEAKFETTLE_UNITPREFERENCE_H</code></pre>
      <p class="note">Guards stop <em>duplicate definitions of the same header</em>. They do <em>not</em> resolve circular dependencies — that needs a forward declaration.</p>
    `,
    check: {
      prompt: "If A.h includes B.h and B.h includes A.h, do include guards fix the resulting compile error?",
      type: "mc",
      options: ["Yes — guards break the cycle", "No — guards only stop repeat includes of one file; you need a forward declaration", "Only with #pragma once"],
      answerIndex: 1,
      why: "Guards prevent re-parsing the same file. A cycle is two files needing each other; the fix is a forward declaration so neither has to fully include the other."
    }
  },
  {
    title: "Qt parent-child ownership",
    html: `
      <p>In Qt you rarely call <code>delete</code>. Every <code>QObject</code> can have a <strong>parent</strong>; when the parent is destroyed it deletes all its children, recursively. Peak Fettle leans on this for lifetime management.</p>
      <p>When you add a <code>Set</code> to an <code>Exercise</code>, the Exercise becomes its parent:</p>
      <pre><code>// src/exercise.cpp
void Exercise::addSet(Set *s) {
    if (!s) return;
    s->setParent(this);   // take ownership so Qt cleans it up
    m_sets.append(s);
    emit setsChanged();
}</code></pre>
      <svg class="diagram" viewBox="0 0 320 150" role="img" aria-label="Ownership tree">
        <rect x="110" y="6" width="120" height="28" rx="6" fill="none" stroke="var(--accent)" stroke-width="2"/>
        <text x="170" y="24" fill="var(--ink)" font-size="11" text-anchor="middle">WorkoutTracker</text>
        <rect x="40" y="60" width="90" height="26" rx="6" fill="none" stroke="var(--muted)" stroke-width="1.6"/>
        <text x="85" y="77" fill="var(--ink)" font-size="11" text-anchor="middle">Exercise</text>
        <rect x="190" y="60" width="90" height="26" rx="6" fill="none" stroke="var(--muted)" stroke-width="1.6"/>
        <text x="235" y="77" fill="var(--ink)" font-size="11" text-anchor="middle">Exercise</text>
        <rect x="40" y="112" width="90" height="26" rx="6" fill="none" stroke="var(--line)" stroke-width="1.6"/>
        <text x="85" y="129" fill="var(--ink)" font-size="11" text-anchor="middle">Set, Set…</text>
        <rect x="190" y="112" width="90" height="26" rx="6" fill="none" stroke="var(--line)" stroke-width="1.6"/>
        <text x="235" y="129" fill="var(--ink)" font-size="11" text-anchor="middle">Set, Set…</text>
        <line x1="150" y1="34" x2="85" y2="60" stroke="var(--muted)" stroke-width="1.4"/>
        <line x1="190" y1="34" x2="235" y2="60" stroke="var(--muted)" stroke-width="1.4"/>
        <line x1="85" y1="86" x2="85" y2="112" stroke="var(--line)" stroke-width="1.4"/>
        <line x1="235" y1="86" x2="235" y2="112" stroke="var(--line)" stroke-width="1.4"/>
      </svg>
      <p class="note">Different from <code>std::unique_ptr</code> (scope decides lifetime). Qt's tree matches the GUI's tree, so cleanup is automatic at shutdown.</p>
    `,
    check: {
      prompt: "You call new Exercise() with no parent and never delete it. What happens?",
      type: "mc",
      options: ["Qt auto-deletes it at exit", "Memory leak — Qt does not manage parentless QObjects", "Compiler error"],
      answerIndex: 1,
      why: "Only objects with a parent (or held by a smart container) get cleaned up. A parentless QObject you forget to delete leaks."
    }
  },
  {
    title: "Q_PROPERTY, signals, and QML binding",
    html: `
      <p><code>Q_PROPERTY</code> is the bridge that makes a C++ value visible to QML. It names a READ getter, an optional WRITE setter, and a NOTIFY signal. QML bindings re-evaluate whenever that signal fires.</p>
      <pre><code>// src/UnitPreference.h
Q_PROPERTY(QString unit READ unit WRITE setUnit NOTIFY unitChanged)</code></pre>
      <pre><code>// src/UnitPreference.cpp — the canonical setter shape
void UnitPreference::setUnit(const QString &u) {
    const QString normalized = (u == QStringLiteral("lbs"))
                               ? QStringLiteral("lbs")
                               : QStringLiteral("kg");   // 1. validate
    if (m_unit == normalized) return;                    // 2. early-out
    m_unit = normalized;                                 // 3. assign
    saveToSettings();                                    // 4. persist
    emit unitChanged();                                  // 5. notify
}</code></pre>
      <p class="note">Validate → early-out → assign → persist → notify. The early-out guards against signal spam; the emit is what redraws every dependent QML binding.</p>
    `,
    check: {
      prompt: "In one line: what breaks if setUnit changes m_unit but forgets to emit unitChanged()?",
      type: "free"
    }
  },
  {
    title: "Constructor overloading vs. static factory",
    html: `
      <p>A <code>Set</code> can be a lift or cardio. Rather than two same-shaped constructors (which a caller could confuse), the lift case is a constructor and the cardio case is a <strong>named static factory</strong>.</p>
      <pre><code>// src/set.h
Set(const QString &exerciseName, double weightKg, int reps,
    int rir = -1, const QDateTime &ts = QDateTime::currentDateTime(),
    QObject *parent = nullptr);                          // lift

static Set *makeCardio(const QString &exerciseName, int durationSec,
    double distanceM = -1.0, double avgPaceSecPerKm = -1.0,
    const QDateTime &ts = QDateTime::currentDateTime(),
    QObject *parent = nullptr);                          // cardio</code></pre>
      <p>Without the named factory, <code>Set("Running", 10.0, 5)</code> is ambiguous — 10&nbsp;kg×5&nbsp;reps, or 10&nbsp;m in 5&nbsp;s? <code>Set::makeCardio("Running", 600, 5000)</code> reads unmistakably.</p>
      <p class="note">From the source comment: "Static so callers never have to remember the argument order (duration comes before weight, which would be easy to mix up with the lift constructor)."</p>
    `,
    check: {
      prompt: "Why a named static factory for cardio instead of just another constructor overload?",
      type: "free"
    }
  },
  {
    title: "const correctness",
    html: `
      <p>A trailing <code>const</code> on a member function is a promise: <em>this call will not modify the object's state</em>. The compiler enforces it.</p>
      <pre><code>// src/UnitPreference.cpp
double UnitPreference::toDisplay(double kg) const {
    return isLbs() ? (kg / KG_PER_LB) : kg;   // reads members, writes none
}</code></pre>
      <p>Writing <code>m_unit = "lbs";</code> inside that body is a compile error. That guarantee matters for QML: a getter that secretly mutated state could leave bindings stale and un-notified.</p>
    `,
    check: {
      prompt: "Can you call a non-const member function on a const object?",
      type: "mc",
      options: ["Yes, always", "No — the compiler rejects it", "Only if it returns void"],
      answerIndex: 1,
      why: "A const object only permits const members. The reverse is fine: const members are callable on any object."
    }
  },
  {
    title: "Storage narrowing, clamp, and atomic IDs",
    html: `
      <p>Peak Fettle picks the smallest sane storage type per field, then clamps inputs before narrowing so a bad caller can't wrap around. The public API stays <code>int</code> so QML bindings never change.</p>
      <pre><code>// src/set.cpp
void Set::setReps(int v) {
    const int clamped = std::clamp(v, 0, 65535);   // defend the invariant
    if (m_reps == clamped) return;
    m_reps = static_cast&lt;quint16&gt;(clamped);          // 16-bit storage
    emit repsChanged();
    emit volumeChanged();   // volume depends on reps
}</code></pre>
      <p>IDs use an atomic counter so they stay unique even if a future worker thread logs sets:</p>
      <pre><code>// src/set.cpp
qint64 Set::nextId() {
    static std::atomic&lt;qint64&gt; counter{0};
    return ++counter;
}</code></pre>
      <p>Try it: requested values are clamped to each field's valid range before storage.</p>
      <div id="clamp-widget"></div>
    `,
    check: {
      prompt: "A caller sets age = 200 (UserProfile clamps to 14..90). What is stored?",
      type: "mc",
      options: ["200, then it wraps", "A runtime error", "90 — std::clamp pins it to the max before the quint8 cast"],
      answerIndex: 2,
      why: "setAgeYears runs std::clamp(200, 14, 90) → 90, then casts. Clamping happens before narrowing, so nothing wraps."
    }
  }
];
</script>

<script id="lesson-quiz">
const QUIZ = [
  { id:"q1", bloom:1, type:"free", points:6,
    prompt:"(Remember) What is an include guard, and what naming convention does Peak Fettle use for it?",
    rubric:["Defines the #ifndef/#define/#endif mechanism that prevents a header being included twice in a translation unit","Gives the PEAKFETTLE_<CLASSNAME>_H pattern"],
    model_answer:"A preprocessor guard (#ifndef/#define/#endif) that stops a header being parsed more than once per translation unit. Peak Fettle names it PEAKFETTLE_<CLASSNAME>_H, e.g. PEAKFETTLE_UNITPREFERENCE_H." },
  { id:"q2", bloom:2, type:"free", points:10,
    prompt:"(Understand) Explain the difference between Qt's parent-child ownership and std::unique_ptr, and why Peak Fettle uses parent-child for Exercise/Set.",
    rubric:["Parent-child = deleting a parent recursively deletes children","unique_ptr = scope/ownership decides lifetime explicitly","Connects to the Exercise→Set tree matching Qt's object hierarchy"],
    model_answer:"With parent-child, destroying a QObject deletes its children automatically; with unique_ptr, the owning pointer's scope decides lifetime. Peak Fettle's data forms a tree (WorkoutTracker→Exercise→Set) that mirrors Qt's object tree, so parent-child gives free, correct cleanup at shutdown." },
  { id:"q3", bloom:3, type:"free", points:12,
    prompt:"(Apply) Write a new Q_PROPERTY for UserProfile storing biological sex (\"M\", \"F\", or \"\" = unset): the macro line, the private member, the getter, and a validating setter with a change-guard and signal.",
    rubric:["Correct Q_PROPERTY macro with READ/WRITE/NOTIFY","Validates to M/F/empty","Early-returns if unchanged, then emits"],
    model_answer:"Q_PROPERTY(QString sex READ sex WRITE setSex NOTIFY profileChanged); member QString m_sex; getter QString sex() const { return m_sex; }; setter normalizes to \"M\"/\"F\" else \"\", returns early if unchanged, sets m_sex, saveToSettings(), emit profileChanged()." },
  { id:"q4", bloom:4, type:"free", points:14,
    prompt:"(Analyze) The Set lift case is a constructor; the cardio case is a static factory. Analyze this asymmetry: what does the factory buy, what does it cost, and would you change it?",
    rubric:["Names the call-site ambiguity two same-arity constructors would create","Identifies the readability/safety benefit of the named factory","Weighs the cost (caller must know which to call) — reasoning quality matters, not a fixed verdict"],
    model_answer:"Two constructors taking (name, double, int...) could be mixed up at the call site; makeCardio names the intent and fixes argument-order confusion. Cost: callers must know which entry point to use. Most answers conclude the asymmetry is worth it; full marks engage the 'more entry points = more surface' counter-point." },
  { id:"q5", bloom:5, type:"free", points:18,
    prompt:"(Evaluate) Peak Fettle stores reps/rir/age in narrowed types (quint16/qint8/quint8) with the public API kept as int. Evaluate this storage-narrowing decision: when is the memory saving real, what risk does it add, and is the clamp-before-narrow discipline sufficient mitigation?",
    rubric:["Takes a position on whether narrowing is worth it here","Cites a concrete risk (silent wrap if you narrow without clamping)","Engages the counter-case: per-object byte savings are tiny for an in-memory model of one user's sets — full marks weigh that honestly"],
    model_answer:"For a single user's in-memory sets the byte savings are negligible, so the strongest case is consistency with the narrow backend columns rather than RAM. The real risk is wrap-around if any path narrows without clamping; the clamp-before-cast discipline in every setter mitigates it. A strong answer judges narrowing as low-value-but-low-cost given the discipline, and notes it only pays off at backend scale." },
  { id:"q6", bloom:5, type:"free", points:14,
    prompt:"(Evaluate) Peak Fettle tightly couples QML to C++ by exposing Q_PROPERTY objects directly. Evaluate tight vs. loose (service-layer) coupling for THIS app, sketch the loose alternative, and defend a recommendation.",
    rubric:["Names real pros (direct reactivity, low boilerplate) and cons (QML knows C++ internals, harder to unit-test) of tight coupling","Sketches a service/model-layer alternative concretely","Defends a recommendation grounded in Peak Fettle being a small co-developed codebase"],
    model_answer:"Tight coupling gives instant binding reactivity and little boilerplate but locks QML to C++ class/property names and is harder to test without a QML engine. A loose design routes through a DataService that QML talks to, decoupling it from concrete classes. For a small, single-team, co-developed app, tight coupling is the right trade today; a service layer earns its keep only with multiple frontends." }
];
</script>

<script id="custom-widget">
window.__registerWidgets = function(PF){
  PF.mountWidget(5, function(stage){
    const host = document.getElementById('clamp-widget');
    if (!host) return;
    const fields = [
      { name: "reps",  store: "quint16", lo: 0,  hi: 65535 },
      { name: "rir",   store: "qint8",   lo: -1, hi: 10 },
      { name: "age",   store: "quint8",  lo: 14, hi: 90 },
    ];
    host.innerHTML = `
      <div class="check" style="margin-top:6px">
        <div class="q">Clamp &amp; narrow visualizer</div>
        <label style="display:block;margin:8px 0 4px">Field</label>
        <div class="opts" id="cw-field"></div>
        <label style="display:block;margin:10px 0 4px">Requested value (from a UI input)</label>
        <input type="text" id="cw-in" value="200" />
        <div class="feedback ok" id="cw-out" style="margin-top:10px"></div>
      </div>`;
    const fieldBox = host.querySelector('#cw-field');
    fields.forEach((f,k)=>{
      const id='cw-f'+k;
      fieldBox.insertAdjacentHTML('beforeend',
        `<label><input type="radio" name="cwf" value="${k}" ${k===0?'checked':''}> ${f.name} — stored as ${f.store}, valid ${f.lo}..${f.hi}</label>`);
    });
    function clamp(v,lo,hi){ return Math.max(lo, Math.min(hi, v)); }
    function recompute(){
      const k = +host.querySelector('input[name=cwf]:checked').value;
      const f = fields[k];
      const raw = parseInt(host.querySelector('#cw-in').value, 10);
      const out = host.querySelector('#cw-out');
      if (Number.isNaN(raw)) { out.textContent = 'Enter a whole number.'; return; }
      const stored = clamp(raw, f.lo, f.hi);
      const note = (stored !== raw) ? ` (clamped from ${raw} — a bad input can't wrap around)` : ' (in range — stored as-is)';
      out.textContent = `std::clamp(${raw}, ${f.lo}, ${f.hi}) → stored ${f.name} = ${stored}${note}`;
    }
    host.querySelectorAll('input[name=cwf]').forEach(el=>el.addEventListener('change', recompute));
    host.querySelector('#cw-in').addEventListener('input', recompute);
    recompute();
  });
};
</script>

  function commit(idx){
    const c = SECTIONS[idx].check;
    const fb = document.getElementById('chkfb');
    if (c.type === 'mc'){
      const sel = document.querySelector('input[name=chk]:checked');
      if (!sel){ fb.className='feedback no'; fb.textContent='Pick an option first.'; return; }
      const ok = (+sel.value === c.answerIndex);
      answers[idx]=+sel.value; committed[idx]=true;
      fb.className = 'feedback ' + (ok?'ok':'no');
      fb.textContent = (ok?'✓ Correct. ':'✗ Not quite. ') + (c.why||'');
    } else {
      const v = (document.getElementById('chkfree').value||'').trim();
      if (v.length < 2){ fb.className='feedback no'; fb.textContent='Write a little more, then commit.'; return; }
      answers[idx]=v; committed[idx]=true;
      fb.className='feedback ok'; fb.textContent='✓ Committed. Retrieval beats re-reading — onward.';
    }
    updateNav();
  }

  function renderQuiz(){
    let html = `<div class="card"><span class="pill">Graded quiz · Bloom L1–L5</span>
      <h2>Show what you know</h2>
      <p class="sub" style="margin-top:-2px">Answer all items, then grade with Claude. L4/L5 are scored on the quality of your reasoning, not keywords.</p>`;
    QUIZ.forEach(q=>{
      html += `<div class="quiz-item"><div class="qprompt">
        <span class="badge ${q.bloom>=5?'b5':''}">Bloom L${q.bloom}</span>
        <span class="pill"> · ${q.points} pts</span><br>${esc(q.prompt)}</div>`;
      if (q.type==='mc'){
        html += `<div class="opts">`;
        q.options.forEach((o,k)=>{ html += `<label><input type="radio" name="${q.id}" value="${k}"> ${esc(o)}</label>`; });
        html += `</div>`;
      } else {
        html += `<textarea data-q="${q.id}" placeholder="Your answer..."></textarea>`;
      }
      html += `</div>`;
    });
    html += `<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="PF.grade()">⚡ Grade with Claude</button>
        <button class="ghost" onclick="PF.copyPrompt()">Copy grading prompt</button>
        <button class="ghost" onclick="PF.toggleRubric()">Show rubric & model answers</button>
      </div>
      <div id="grade-status"></div>
      <div class="grade-box" id="grade-box"></div>
      <div class="grade-box" id="rubric-box"></div>
      </div>`;
    stage.innerHTML = html;
    hydrateQuiz();
    updateNav();
  }

  function hydrateQuiz(){
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){}
    QUIZ.forEach(function(q){
      const v = saved[q.id];
      if (v != null){
        if (q.type === 'mc'){
          const idx = q.options.indexOf(v);
          if (idx >= 0){ const r = document.querySelector('input[name='+q.id+'][value="'+idx+'"]'); if (r) r.checked = true; }
        } else {
          const ta = document.querySelector('textarea[data-q='+q.id+']');
          if (ta) ta.value = v;
        }
      }
      if (q.type === 'mc'){
        const els = document.querySelectorAll('input[name='+q.id+']');
        els && els.forEach && els.forEach(function(el){ el.addEventListener('change', persistQuiz); });
      } else {
        const ta = document.querySelector('textarea[data-q='+q.id+']');
        if (ta) ta.addEventListener('input', persistQuiz);
      }
    });
  }

  function persistQuiz(){
    collectQuiz();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
  }

  function collectQuiz(){
    QUIZ.forEach(q=>{
      if (q.type==='mc'){
        const sel = document.querySelector(`input[name=${q.id}]:checked`);
        quizAnswers[q.id] = sel ? q.options[+sel.value] : "(no answer)";
      } else {
        const ta = document.querySelector(`textarea[data-q=${q.id}]`);
        quizAnswers[q.id] = (ta && ta.value.trim()) || "(no answer)";
      }
    });
  }

  function buildGradingPrompt(){
    collectQuiz();
    let p = `You are grading a learner (Arvin) on the Peak Fettle codebase curriculum lesson "${LESSON_META.title}" (${LESSON_META.id}).\n`;
    p += `Grade each item against its rubric. Award PARTIAL credit. For Bloom L4/L5/L6 items, grade the QUALITY OF REASONING — a clear, evidence-backed, counter-case-aware argument scores full marks even if it differs from the model answer; do NOT keyword-match. Give specific, kind, actionable feedback per item. End with: total score /${QUIZ.reduce((a,q)=>a+q.points,0)}, the Bloom levels that look strong vs. weak, and one misconception to revisit. Then remind me to update the LEARNER PROFILE in teacher_skill.md.\n\n`;
    QUIZ.forEach((q,n)=>{
      p += `--- Item ${n+1} (${q.id}, Bloom L${q.bloom}, ${q.points} pts) ---\n`;
      p += `Question: ${q.prompt}\n`;
      p += `Rubric: ${(q.rubric||[]).map((r,k)=>`(${k+1}) ${r}`).join(' ')}\n`;
      p += `Reference/model answer: ${q.model_answer||'(none)'}\n`;
      p += `Arvin's answer: ${quizAnswers[q.id]}\n\n`;
    });
    return p;
  }

  async function grade(){
    const status = document.getElementById('grade-status');
    const box = document.getElementById('grade-box');
    const prompt = buildGradingPrompt();
    // Channel (a): Cowork bridge
    if (window.cowork && typeof window.cowork.askClaude === 'function'){
      status.textContent = 'Grading with Claude…';
      try{
        const res = await window.cowork.askClaude(prompt, []);
        const text = (typeof res === 'string') ? res : (res && (res.text||res.content||JSON.stringify(res)));
        box.style.display='block';
        box.innerHTML = `<strong>Claude's grade</strong><div style="white-space:pre-wrap;margin-top:8px">${esc(text)}</div>`;
        status.textContent = '';
        return;
      }catch(e){
        status.textContent = 'Bridge grading failed ('+e.message+'). Falling back to clipboard.';
      }
    }
    // Channel (b): clipboard fallback
    copyPrompt(true);
  }

  function copyPrompt(fromGrade){
    const status = document.getElementById('grade-status');
    const prompt = buildGradingPrompt();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
    showPrompt(prompt);   // ALWAYS render the prompt+answers so nothing is ever lost
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(prompt).then(function(){
        status.textContent = 'Copied to clipboard AND shown below — paste it into your Claude chat to be graded.';
      }).catch(function(){
        status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
      });
    } else {
      status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
    }
  }
  function showPrompt(prompt){
    const box = document.getElementById('grade-box');
    box.style.display='block';
    box.innerHTML = `<strong>Copy this grading prompt into Claude:</strong>
      <textarea style="margin-top:8px" rows="10">${esc(prompt)}</textarea>`;
  }

  function toggleRubric(){
    const box = document.getElementById('rubric-box');
    if (box.style.display==='block'){ box.style.display='none'; return; }
    let h = `<strong>Rubric & model answers (self-assess)</strong>`;
    QUIZ.forEach((q,n)=>{
      h += `<div style="margin-top:12px"><div class="pill">Item ${n+1} · Bloom L${q.bloom}</div>
        <div class="rubric"><em>Rubric:</em> ${(q.rubric||[]).map(esc).join(' · ')}</div>
        <div class="rubric"><em>Model:</em> ${esc(q.model_answer||'')}</div></div>`;
    });
    box.style.display='block'; box.innerHTML = h;
  }

  function updateNav(){
    bar.style.width = Math.round((i/(TOTAL-1))*100) + '%';
    prevBtn.disabled = (i===0);
    if (i >= SECTIONS.length){ nextBtn.classList.add('hidden'); }
    else {
      nextBtn.classList.remove('hidden');
      nextBtn.textContent = (i === SECTIONS.length-1) ? 'Go to quiz →' : 'Next →';
      // Gate: if this section has an uncommitted check, block advancing.
      const needsCheck = SECTIONS[i] && SECTIONS[i].check && !committed[i];
      nextBtn.disabled = !!needsCheck;
      nextBtn.title = needsCheck ? 'Answer the check to continue' : '';
    }
  }

  function render(){ if (i < SECTIONS.length) renderSection(i); else renderQuiz(); }
  function next(){ if (i < SECTIONS.length){ i++; render(); window.scrollTo(0,0); } }
  function prev(){ if (i>0){ i--; render(); window.scrollTo(0,0); } }

  // Custom widget hook: lessons may register per-section mount fns.
  const widgetMounts = {};
  function mountWidget(idx, fn){ widgetMounts[idx]=fn; }
  function runCustomWidgetFor(idx){ if (widgetMounts[idx]) try{ widgetMounts[idx](stage); }catch(e){console.warn(e);} }

  return { next, prev, commit, grade, copyPrompt, toggleRubric, mountWidget,
           _boot:function(){ render(); } };
})();
</script>
<script>
/* register custom widgets (if any), then boot — so mounts exist before render. */
if (window.__registerWidgets) window.__registerWidgets(PF);
PF._boot();
</script>
