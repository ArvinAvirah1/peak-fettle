<script id="lesson-sections">
const SECTIONS = [
  {
    title: "1 · The atom: a Set, and why volume is computed not stored",
    html: `
      <p>A <code>Set</code> is the atomic unit of progress in Peak Fettle — one completed work set, e.g. <em>"Bench press, 80 kg × 5 reps."</em> Everything else (exercises, workouts, graphs, rankings) is built up from sets.</p>
      <p>The set's <strong>volume</strong> (tonnage) is weight × reps = 80 × 5 = <strong>400 kg</strong>. But Peak Fettle does <em>not</em> store 400 as a field — it computes it every time it's read:</p>
      <pre><code>double volume() const { return m_kind == QLatin1String("lift")
                               ? m_weightKg * m_reps : 0.0; }</code></pre>
      <p class="note"><strong>Analogy:</strong> you don't write your <em>age</em> in your passport — you write your <em>birth date</em> and compute age on demand, because the birth date never goes stale. Storing a derived value risks it drifting out of sync with the inputs it came from.</p>
      <p>For cardio sets, volume returns <code>0.0</code> — tonnage is meaningless when progress is measured in distance and time.</p>
    `,
    check: { prompt:"Give one concrete bug that storing volume as its own column would risk, that computing-on-read avoids.", type:"free" }
  },
  {
    title: "2 · One class, two shapes: the kind discriminator",
    html: `
      <p>A set is either a <strong>lift</strong> (weight, reps, RIR) or <strong>cardio</strong> (duration, distance, pace). Rather than two classes, one <code>Set</code> carries a <code>kind</code> field ("lift" | "cardio"), and the irrelevant fields hold a <code>-1</code> "not recorded" sentinel.</p>
      <svg class="diagram" viewBox="0 0 460 120" role="img" aria-label="Set with kind discriminator">
        <rect x="160" y="8" width="140" height="30" rx="8" fill="none" stroke="var(--accent)" stroke-width="2"/>
        <text x="230" y="28" fill="var(--ink)" font-size="13" text-anchor="middle">Set · kind</text>
        <line x1="230" y1="38" x2="90" y2="64" stroke="var(--line)" stroke-width="2"/>
        <line x1="230" y1="38" x2="370" y2="64" stroke="var(--line)" stroke-width="2"/>
        <rect x="14" y="64" width="160" height="48" rx="8" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
        <text x="94" y="84" fill="var(--ink)" font-size="12" text-anchor="middle">"lift"</text>
        <text x="94" y="102" fill="var(--muted)" font-size="11" text-anchor="middle">weightKg · reps · rir</text>
        <rect x="286" y="64" width="160" height="48" rx="8" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
        <text x="366" y="84" fill="var(--ink)" font-size="12" text-anchor="middle">"cardio"</text>
        <text x="366" y="102" fill="var(--muted)" font-size="11" text-anchor="middle">durationSec · distanceM · pace</text>
      </svg>
      <p>This mirrors the backend's <code>sets.kind</code> column exactly — same noun, same shape, across the C++ layer and the database.</p>
      <p>The cardio path uses a <strong>static factory</strong> instead of a constructor:</p>
      <pre><code>static Set *makeCardio(const QString &exerciseName, int durationSec, ...);</code></pre>
      <p class="note">The comment explains why: <em>"Static so callers never have to remember the argument order (duration comes before weight, which would be easy to mix up with the lift constructor)."</em></p>
    `,
    check: { prompt:"Why use a static factory makeCardio() instead of just another constructor overload?", type:"mc",
      options:[
        "Constructors can't return pointers",
        "To give the call a clear name so the duration-vs-weight argument order can't be silently confused",
        "Static functions are faster than constructors"
      ], answerIndex:1,
      why:"A named factory makes the intent explicit and removes the risk of swapping duration and weight, which share similar types." }
  },
  {
    title: "3 · Storage narrowing & clamping — invariants in the setter",
    html: `
      <p>In a size-shrink pass, <code>reps</code> became a <code>quint16</code> (0–65535) and <code>rir</code>/<code>rpe</code> became <code>qint8</code> — because reps never realistically exceed ~200 and RIR is just −1..10. The <em>public</em> API stays <code>int</code> so QML bindings don't change.</p>
      <svg class="diagram" viewBox="0 0 460 70" role="img" aria-label="clamp ranges">
        <text x="10" y="20" fill="var(--muted)" font-size="12">reps</text>
        <line x1="60" y1="16" x2="440" y2="16" stroke="var(--line)" stroke-width="2"/>
        <text x="60" y="34" fill="var(--ink)" font-size="11">0</text>
        <text x="410" y="34" fill="var(--ink)" font-size="11">65535</text>
        <text x="10" y="56" fill="var(--muted)" font-size="12">rir</text>
        <line x1="60" y1="52" x2="200" y2="52" stroke="var(--accent)" stroke-width="2"/>
        <text x="60" y="70" fill="var(--ink)" font-size="11">-1</text>
        <text x="186" y="70" fill="var(--ink)" font-size="11">10</text>
      </svg>
      <p>The setter <strong>clamps before narrowing</strong> so a buggy caller can't silently wrap around:</p>
      <pre><code>void Set::setReps(int v) {
    const int clamped = std::clamp(v, 0, 65535);
    if (m_reps == clamped) return;
    m_reps = static_cast&lt;quint16&gt;(clamped);
    emit repsChanged();
    emit volumeChanged();   // volume depends on reps, so notify it too
}</code></pre>
      <p class="note">Notice <code>setReps</code> also emits <code>volumeChanged()</code> — because volume is <em>derived</em> from reps, anything in the UI bound to volume must redraw.</p>
      <p>Contrast: cardio's <code>durationSec</code> is a <code>qint32</code> and is <strong>not</strong> clamped — a 24h ultra-endurance ride is 86,400 s, so it needs headroom and there's no tight bound to defend.</p>
    `,
    check: { prompt:"Why does setReps emit volumeChanged() in addition to repsChanged()?", type:"free" }
  },
  {
    title: "4 · Ownership: Exercise owns its Sets, WorkoutTracker owns everything",
    html: `
      <p>In C++ you must decide <em>who frees the memory</em>. Qt uses parent-child ownership: when a parent <code>QObject</code> is destroyed, it deletes its children. <code>Exercise::addSet</code> takes ownership:</p>
      <pre><code>void Exercise::addSet(Set *s) {
    if (!s) return;
    s->setParent(this);   // take ownership so Qt cleans it up
    m_sets.append(s);
    emit setsChanged();
}</code></pre>
      <p><code>WorkoutTracker</code> is the singleton hub. It holds a <code>QHash&lt;QString, Exercise*&gt;</code> — a hash map keyed by exercise name — so logging another rep of "Bench press" finds the right <code>Exercise</code> in <strong>O(1)</strong> instead of scanning a list.</p>
      <svg class="diagram" viewBox="0 0 460 130" role="img" aria-label="ownership tree">
        <rect x="150" y="6" width="160" height="30" rx="8" fill="none" stroke="var(--accent)" stroke-width="2"/>
        <text x="230" y="26" fill="var(--ink)" font-size="12" text-anchor="middle">WorkoutTracker (singleton)</text>
        <text x="230" y="50" fill="var(--muted)" font-size="10" text-anchor="middle">QHash&lt;name to Exercise*&gt;</text>
        <line x1="180" y1="56" x2="110" y2="74" stroke="var(--line)" stroke-width="2"/>
        <line x1="280" y1="56" x2="350" y2="74" stroke="var(--line)" stroke-width="2"/>
        <rect x="40" y="74" width="140" height="26" rx="7" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
        <text x="110" y="91" fill="var(--ink)" font-size="11" text-anchor="middle">Exercise "Bench"</text>
        <rect x="280" y="74" width="140" height="26" rx="7" fill="none" stroke="var(--muted)" stroke-width="1.5"/>
        <text x="350" y="91" fill="var(--ink)" font-size="11" text-anchor="middle">Exercise "Squat"</text>
        <text x="110" y="120" fill="var(--muted)" font-size="10" text-anchor="middle">owns Set, Set, Set…</text>
        <text x="350" y="120" fill="var(--muted)" font-size="10" text-anchor="middle">owns Set, Set…</text>
      </svg>
    `,
    check: { prompt:"Why a QHash keyed by exercise name rather than a plain list of exercises?", type:"mc",
      options:[
        "Hashes use less memory than lists",
        "So looking up the Exercise for a logged set is O(1) instead of scanning every exercise",
        "Lists can't hold pointers"
      ], answerIndex:1,
      why:"Logging happens constantly; an O(1) name lookup keeps each log cheap no matter how many exercises exist." }
  },
  {
    title: "5 · Derived metric: Epley E1RM and the reps==1 exception",
    html: `
      <p>Estimated 1-rep-max (E1RM) is the primary <em>progress</em> metric. Peak Fettle uses the <strong>Epley formula</strong>: <code>1RM = w · (1 + reps/30)</code>. So 100 kg × 5 → 100 × (1 + 5/30) = <strong>116.7 kg</strong>.</p>
      <p>But there's a deliberate exception. If <code>reps == 1</code>, the lifter <em>already performed a true single</em> — so return the weight directly, not <code>w·(1+1/30)</code>, which would inflate a 200 kg single to 206.7 kg (a 3.3% lie):</p>
      <pre><code>const double e1rm = (s->reps() == 1)
    ? s->weightKg()                               // true 1RM — no multiplier
    : s->weightKg() * (1.0 + s->reps() / 30.0);   // Epley for 2+ reps</code></pre>
      <p class="note"><strong>Why it matters:</strong> this value feeds <code>percentileForExercise()</code> and <code>percentilesForAll()</code>. Inflated E1RM → artificially high cohort percentile → the rankings (the product's competitive hook) become dishonest. This is a <em>data-integrity</em> decision, not cosmetics.</p>
      <p><strong>Play with it</strong> — drag the sliders and watch the formula switch to the raw-weight branch the instant reps hits 1:</p>
      <div id="epley-mount"></div>
    `,
    check: { prompt:"Compute the E1RM of a 140 kg × 3 set, then a 140 kg × 1 set. Why are they treated differently?", type:"free" }
  },
  {
    title: "6 · 'Best per day': a product decision living in the data layer",
    html: `
      <p>The progress graph calls <code>progressSeries(metric, perSet=false)</code>. By default it returns <strong>one point per training day — the best value for that metric that day</strong>, not every set.</p>
      <p>Why? Because plotting every set creates a demotivating sawtooth: a lifter does a heavy top set, then lighter back-off sets, and the graph makes it look like they got <em>weaker</em> within the session. Both a beta tester (Marcus) and the founder flagged this "your second set to failure made you look weaker" artifact.</p>
      <svg class="diagram" viewBox="0 0 460 110" role="img" aria-label="per-set sawtooth vs best per day">
        <polyline points="20,30 60,80 100,70 140,90 180,35 220,85" fill="none" stroke="var(--warn)" stroke-width="2"/>
        <text x="120" y="105" fill="var(--warn)" font-size="11" text-anchor="middle">perSet=true → sawtooth</text>
        <polyline points="260,40 320,34 380,28 440,22" fill="none" stroke="var(--good)" stroke-width="2.5"/>
        <text x="360" y="105" fill="var(--good)" font-size="11" text-anchor="middle">best-per-day → honest trend</text>
      </svg>
      <p><code>perSet=true</code> still exists, but only for debug/export — the header says outright: <em>"UI should never pass true here."</em></p>
    `,
    check: { prompt:"In one line: who does the best-per-day default serve, and who might want perSet=true?", type:"free" }
  },
  {
    title: "Teach it back (Feynman)",
    html: `
      <p>Last step before the quiz. Teaching exposes the gaps you didn't know you had.</p>
      <p class="note">Explain to an imaginary CS-101 student, in about 5 sentences: <strong>what a Set is</strong> in Peak Fettle, <strong>why volume and E1RM are computed rather than stored</strong>, and <strong>how WorkoutTracker finds the right Exercise quickly</strong>.</p>
    `,
    check: { prompt:"Write your ~5-sentence teach-back here.", type:"free" }
  }
];
</script>

<script id="lesson-quiz">
const QUIZ = [
  { id:"q1", bloom:1, type:"mc", points:8,
    prompt:"(Remember) What does rir = -1 mean on a Set?",
    options:["The set was taken to failure","Reps in reserve were not recorded","The set is invalid and ignored"],
    answerIndex:1,
    rubric:["Identifies -1 as the 'not recorded' sentinel (RIR 0 = to failure)"],

  { id:"q2", bloom:2, type:"free", points:12,

    rubric:["Restates single-source-of-truth idea","Names the drift/desync risk of storing derived data"],
    model_answer:"Storing a derived value risks it drifting out of sync with the weight/reps it came from; computing on read keeps the raw inputs authoritative." },

  { id:"q2b", bloom:3, type:"free", points:12,
    prompt:"(Apply) For one exercise a lifter logs 120 kg × 4 on Monday and 130 kg × 1 on Friday. Compute the E1RM the code records for each set, and state which value becomes the exercise's estimatedOneRepMax().",
    rubric:["Applies Epley w·(1+reps/30) to the 4-rep set → 120×(1+4/30)=136 kg","Uses raw weight for the 1-rep set (true single, no multiplier) → 130 kg","Concludes estimatedOneRepMax keeps the max, so 136 kg wins"],
    model_answer:"120×(1+4/30)=136.0 kg for the 4-rep set; the 130×1 returns 130 kg because reps==1 skips the multiplier. estimatedOneRepMax() keeps the maximum across sets, so the exercise's E1RM is 136 kg — the heavier single does NOT win here." },

  { id:"q3", bloom:4, type:"free", points:18,
    prompt:"(Analyze) Lift reps/rir are clamped and narrowed (quint16 / qint8); cardio durationSec is a qint32 and is NOT clamped. Explain the asymmetry and what it implies about each field's 'threat model.'",
    rubric:["Notes reps/RIR have known small bounds, so clamping defends an invariant against garbage input","Notes duration legitimately spans seconds to 24h+, so a wide type with headroom and no clamp is correct","Connects the choice to what 'bad data' means for each field"],
    model_answer:"Reps and RIR have small, known ranges, so narrow storage plus clamping catches impossible values cheaply. Duration has no tight upper bound (ultra-endurance events), so it needs a wide type with headroom and there's no sane value to clamp to — different fields, different definitions of 'bad input.'" },

  { id:"q4", bloom:5, type:"free", points:21,
    prompt:"(Evaluate) The reps==1 Epley exception returns raw weight instead of w·(1+1/30). Evaluate this as a data-integrity decision: what breaks downstream without it, and is the extra special-case complexity justified?",

    model_answer:"Without the exception, every true single inflates ~3.3%, and since E1RM feeds percentileForExercise/percentilesForAll, that inflation propagates into cohort rankings — dishonestly boosting rank, which corrupts the product's core competitive hook. The branch is one cheap comparison, and the integrity payoff is large, so it's justified; a strong answer still acknowledges that each special case adds a path to test and reason about." },

  { id:"q5", bloom:5, type:"free", points:21,
    prompt:"(Evaluate) progressSeries defaults perSet=false (one best point/day). Marcus, a competitive powerlifter, wants every set plotted by default. Defend or refute the default, name the failure mode it prevents, and say who each choice serves.",

    model_answer:"Keep the best-per-day default: it protects the progress narrative for the majority and prevents the demotivating intra-session sawtooth. perSet serves analytical power users like Marcus who want to see fatigue across sets. The right move isn't to flip the default but to expose a per-set toggle, serving both without making the common case misleading." },

<script id="custom-widget">
/* Live Epley E1RM calculator — mounted into Concept 5 (section index 4).
   Wrapped so it runs after the engine defines PF, regardless of script order. */
window.__registerWidgets = function(PF){
  PF.mountWidget(4, function(){
    const host = document.getElementById('epley-mount');
    if (!host) return;
    host.innerHTML = `
      <div class="calc">
        <div class="row"><label>Weight (kg)</label><input id="w" type="range" min="20" max="300" step="2.5" value="100"><span class="val" id="wv">100 kg</span></div>
        <div class="row"><label>Reps</label><input id="r" type="range" min="1" max="15" step="1" value="5"><span class="val" id="rv">5 reps</span></div>
        <div class="out" id="out"></div>
        <div class="flag" id="flag"></div>
      </div>`;
    const w=document.getElementById('w'), r=document.getElementById('r');
    const wv=document.getElementById('wv'), rv=document.getElementById('rv');
    const out=document.getElementById('out'), flag=document.getElementById('flag');
    function recompute(){
      const W=parseFloat(w.value), R=parseInt(r.value,10);
      wv.textContent=W+' kg'; rv.textContent=R+(R===1?' rep':' reps');
      let e1rm, branch;
      if (R===1){ e1rm=W; branch='reps==1 → raw weight (no multiplier)'; }
      else { e1rm=W*(1+R/30); branch='Epley: w·(1 + reps/30)'; }
      out.innerHTML = 'E1RM ≈ <strong>'+e1rm.toFixed(1)+' kg</strong> &nbsp;<small>'+branch+'</small>';
      if (R===1){
        const inflated=W*(1+1/30);
        flag.textContent='Without the exception, Epley would report '+inflated.toFixed(1)+' kg — a '+(((inflated-W)/W)*100).toFixed(1)+'% inflation on a true single.';
      } else { flag.textContent=''; }
    }
    w.addEventListener('input',recompute); r.addEventListener('input',recompute); recompute();
  });
};
</script>

<!-- ENGINE (identical to lesson_app_template.html; do not edit per-lesson) -->
<script>
const PF = (function(){
  let i = 0;
  const answers = {};
  const committed = {};
  const quizAnswers = {};
  const LS_KEY = 'pf_lesson_' + (LESSON_META.id || 'x');
  const stage = document.getElementById('stage');
  const bar = document.getElementById('bar');
  const nextBtn = document.getElementById('next');
  const prevBtn = document.getElementById('prev');
  const TOTAL = SECTIONS.length + 1;
  const widgetMounts = {};

  document.getElementById('lesson-title').textContent = LESSON_META.title || document.getElementById('lesson-title').textContent;
  document.getElementById('lesson-sub').textContent = LESSON_META.subtitle || '';
  document.title = "Peak Fettle Lesson · " + (LESSON_META.title||"");

  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function renderSection(idx){
    const s = SECTIONS[idx];
    let html = `<div class="card"><span class="pill">Section ${idx+1} of ${SECTIONS.length}</span>
      <h2>${esc(s.title)}</h2><div class="body">${s.html}</div>`;
    if (s.check){
      const c = s.check;
      html += `<div class="check"><div class="q">🧠 ${esc(c.prompt)}</div>`;
      if (c.type === 'mc'){
        html += `<div class="opts" id="opts">`;
        c.options.forEach((o,k)=>{ html += `<label><input type="radio" name="chk" value="${k}"> ${esc(o)}</label>`; });
        html += `</div><button class="ghost" onclick="PF.commit(${idx})">Check & continue</button>`;
      } else {
        html += `<textarea id="chkfree" placeholder="Type your answer — then commit to continue"></textarea>
                 <button class="ghost" onclick="PF.commit(${idx})" style="margin-top:8px">Commit answer</button>`;
      }
      html += `<div class="feedback" id="chkfb"></div></div>`;
    }
    html += `</div>`;
    stage.innerHTML = html;
    runCustomWidgetFor(idx);
    updateNav();
  }

  function commit(idx){
    const c = SECTIONS[idx].check;
    const fb = document.getElementById('chkfb');
    if (c.type === 'mc'){
      const sel = document.querySelector('input[name=chk]:checked');
      if (!sel){ fb.className='feedback no'; fb.textContent='Pick an option first.'; return; }
      const ok = (+sel.value === c.answerIndex);
      answers[idx]=+sel.value; committed[idx]=true;
      fb.className = 'feedback ' + (ok?'ok':'no');
      fb.textContent = (ok?'✓ Correct. ':'✗ Not quite. ') + (c.why||'');
    } else {
      const v = (document.getElementById('chkfree').value||'').trim();
      if (v.length < 2){ fb.className='feedback no'; fb.textContent='Write a little more, then commit.'; return; }
      answers[idx]=v; committed[idx]=true;
      fb.className='feedback ok'; fb.textContent='✓ Committed. Retrieval beats re-reading — onward.';
    }
    updateNav();
  }

  function renderQuiz(){
    let html = `<div class="card"><span class="pill">Graded quiz · Bloom L1–L5</span>
      <h2>Show what you know</h2>
      <p class="sub" style="margin-top:-2px">Answer all items, then grade with Claude. L4/L5 are scored on the quality of your reasoning, not keywords.</p>`;
    QUIZ.forEach(q=>{
      html += `<div class="quiz-item"><div class="qprompt">
        <span class="badge ${q.bloom>=5?'b5':''}">Bloom L${q.bloom}</span>
        <span class="pill"> · ${q.points} pts</span><br>${esc(q.prompt)}</div>`;
      if (q.type==='mc'){
        html += `<div class="opts">`;
        q.options.forEach((o,k)=>{ html += `<label><input type="radio" name="${q.id}" value="${k}"> ${esc(o)}</label>`; });
        html += `</div>`;
      } else {
        html += `<textarea data-q="${q.id}" placeholder="Your answer..."></textarea>`;
      }
      html += `</div>`;
    });
    html += `<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="PF.grade()">⚡ Grade with Claude</button>
        <button class="ghost" onclick="PF.copyPrompt()">Copy grading prompt</button>
        <button class="ghost" onclick="PF.toggleRubric()">Show rubric & model answers</button>
      </div>
      <div id="grade-status"></div>
      <div class="grade-box" id="grade-box"></div>
      <div class="grade-box" id="rubric-box"></div>
      </div>`;
    stage.innerHTML = html;
    hydrateQuiz();
    updateNav();
  }

  function hydrateQuiz(){
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){}
    QUIZ.forEach(function(q){
      const v = saved[q.id];
      if (v != null){
        if (q.type === 'mc'){
          const idx = q.options.indexOf(v);
          if (idx >= 0){ const r = document.querySelector('input[name='+q.id+'][value="'+idx+'"]'); if (r) r.checked = true; }
        } else {
          const ta = document.querySelector('textarea[data-q='+q.id+']');
          if (ta) ta.value = v;
        }
      }
      if (q.type === 'mc'){
        const els = document.querySelectorAll('input[name='+q.id+']');
        els && els.forEach && els.forEach(function(el){ el.addEventListener('change', persistQuiz); });
      } else {
        const ta = document.querySelector('textarea[data-q='+q.id+']');
        if (ta) ta.addEventListener('input', persistQuiz);
      }
    });
  }

  function persistQuiz(){
    collectQuiz();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
  }

  function collectQuiz(){
    QUIZ.forEach(q=>{
      if (q.type==='mc'){
        const sel = document.querySelector(`input[name=${q.id}]:checked`);
        quizAnswers[q.id] = sel ? q.options[+sel.value] : "(no answer)";
      } else {
        const ta = document.querySelector(`textarea[data-q=${q.id}]`);
        quizAnswers[q.id] = (ta && ta.value.trim()) || "(no answer)";
      }
    });
  }

  function buildGradingPrompt(){
    collectQuiz();
    let p = `You are grading a learner (Arvin) on the Peak Fettle codebase curriculum lesson "${LESSON_META.title}" (${LESSON_META.id}).\n`;
    p += `Grade each item against its rubric. Award PARTIAL credit. For Bloom L4/L5/L6 items, grade the QUALITY OF REASONING — a clear, evidence-backed, counter-case-aware argument scores full marks even if it differs from the model answer; do NOT keyword-match. Give specific, kind, actionable feedback per item. End with: total score /${QUIZ.reduce((a,q)=>a+q.points,0)}, the Bloom levels that look strong vs. weak, and one misconception to revisit. Then remind me to update the LEARNER PROFILE in teacher_skill.md.\n\n`;
    QUIZ.forEach((q,n)=>{
      p += `--- Item ${n+1} (${q.id}, Bloom L${q.bloom}, ${q.points} pts) ---\n`;
      p += `Question: ${q.prompt}\n`;
      p += `Rubric: ${(q.rubric||[]).map((r,k)=>`(${k+1}) ${r}`).join(' ')}\n`;
      p += `Reference/model answer: ${q.model_answer||'(none)'}\n`;
      p += `Arvin's answer: ${quizAnswers[q.id]}\n\n`;
    });
    return p;
  }

  async function grade(){
    const status = document.getElementById('grade-status');
    const box = document.getElementById('grade-box');
    const prompt = buildGradingPrompt();
    if (window.cowork && typeof window.cowork.askClaude === 'function'){
      status.textContent = 'Grading with Claude…';
      try{
        const res = await window.cowork.askClaude(prompt, []);
        const text = (typeof res === 'string') ? res : (res && (res.text||res.content||JSON.stringify(res)));
        box.style.display='block';
        box.innerHTML = `<strong>Claude's grade</strong><div style="white-space:pre-wrap;margin-top:8px">${esc(text)}</div>`;
        status.textContent = '';
        return;
      }catch(e){
        status.textContent = 'Bridge grading failed ('+e.message+'). Falling back to clipboard.';
      }
    }
    copyPrompt(true);
  }

  function copyPrompt(fromGrade){
    const status = document.getElementById('grade-status');
    const prompt = buildGradingPrompt();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
    showPrompt(prompt);   // ALWAYS render the prompt+answers so nothing is ever lost
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(prompt).then(function(){
        status.textContent = 'Copied to clipboard AND shown below — paste it into your Claude chat to be graded.';
      }).catch(function(){
        status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
      });
    } else {
      status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
    }
  }
  function showPrompt(prompt){
    const box = document.getElementById('grade-box');
    box.style.display='block';
    box.innerHTML = `<strong>Copy this grading prompt into Claude:</strong>
      <textarea style="margin-top:8px" rows="10">${esc(prompt)}</textarea>`;
  }

  function toggleRubric(){
    const box = document.getElementById('rubric-box');
    if (box.style.display==='block'){ box.style.display='none'; return; }
    let h = `<strong>Rubric & model answers (self-assess)</strong>`;
    QUIZ.forEach((q,n)=>{
      h += `<div style="margin-top:12px"><div class="pill">Item ${n+1} · Bloom L${q.bloom}</div>
        <div class="rubric"><em>Rubric:</em> ${(q.rubric||[]).map(esc).join(' · ')}</div>
        <div class="rubric"><em>Model:</em> ${esc(q.model_answer||'')}</div></div>`;
    });
    box.style.display='block'; box.innerHTML = h;
  }

  function updateNav(){
    bar.style.width = Math.round((i/(TOTAL-1))*100) + '%';
    prevBtn.disabled = (i===0);
    if (i >= SECTIONS.length){ nextBtn.classList.add('hidden'); }
    else {
      nextBtn.classList.remove('hidden');
      nextBtn.textContent = (i === SECTIONS.length-1) ? 'Go to quiz →' : 'Next →';
      const needsCheck = SECTIONS[i] && SECTIONS[i].check && !committed[i];
      nextBtn.disabled = !!needsCheck;
      nextBtn.title = needsCheck ? 'Answer the check to continue' : '';
    }
  }

  function render(){ if (i < SECTIONS.length) renderSection(i); else renderQuiz(); }
  function next(){ if (i < SECTIONS.length){ i++; render(); window.scrollTo(0,0); } }
  function prev(){ if (i>0){ i--; render(); window.scrollTo(0,0); } }
  function mountWidget(idx, fn){ widgetMounts[idx]=fn; }
  function runCustomWidgetFor(idx){ if (widgetMounts[idx]) try{ widgetMounts[idx](stage); }catch(e){console.warn(e);} }

  return { next, prev, commit, grade, copyPrompt, toggleRubric, mountWidget,
           _boot:function(){ render(); } };
})();
</script>
<script>
/* register custom widgets (if any), then boot so mounts exist before render. */
if (window.__registerWidgets) window.__registerWidgets(PF);
PF._boot();
</script>
