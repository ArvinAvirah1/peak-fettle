<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Peak Fettle Lesson · {{LESSON_TITLE}}</title>
<!--
  ============================================================================
  PEAK FETTLE CODEBASE CURRICULUM — INTERACTIVE LESSON SHELL (reusable engine)
  ============================================================================
  HOW TO MAKE A LESSON FROM THIS FILE:
    1. Copy to lessons/Lxx_<slug>.html
    2. Edit ONLY the three data blocks marked  >>> FILL <<<  below:
         LESSON_META, SECTIONS, QUIZ
       and (optionally) the ONE custom-widget hook: <script id="custom-widget">.
    3. DO NOT touch the engine (everything after the >>> ENGINE — DO NOT EDIT <<<
       marker). It provides navigation, retrieval gates, and the
       "Grade with Claude" flow (Cowork bridge -> clipboard fallback -> reveal).
  Pedagogy contract lives in 00_TEACHING_METHODOLOGY.md (Parts 3 & 4).
  ============================================================================
-->
<style>
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel-2:#222b35; --ink:#e8edf2; --muted:#94a3b8;
    --line:#2c3947; --accent:#3ba776; --accent-ink:#0f1419; --warn:#e0a458; --bad:#d96a6a;
    --good:#5fbf8f; --radius:14px; --maxw:820px;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f6f8; --panel:#ffffff; --panel-2:#eef2f6; --ink:#1a2129; --muted:#5a6b7b;
           --line:#dbe3ea; --accent:#2f8c61; --accent-ink:#ffffff; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:24px 18px 96px;}
  header.lh{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
  .logo{width:30px;height:30px;flex:0 0 auto}
  .eyebrow{color:var(--accent);font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:12px;}
  h1{font-size:25px;margin:.1em 0 .2em;line-height:1.2}
  .sub{color:var(--muted);font-size:14px;margin-bottom:18px}
  .progress{height:6px;background:var(--panel-2);border-radius:99px;overflow:hidden;margin:14px 0 22px}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:width .3s ease}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 22px 18px;margin:0 0 18px;box-shadow:0 1px 0 rgba(0,0,0,.04)}
  .card h2{margin:.1em 0 .5em;font-size:19px}
  .card h3{font-size:15px;margin:1.1em 0 .3em;color:var(--accent)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;
    background:var(--panel-2);color:var(--muted);border:1px solid var(--line);vertical-align:middle}
  .badge.b5{background:rgba(59,167,118,.16);color:var(--good);border-color:transparent}
  pre{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:13px 14px;
    overflow:auto;font:13px/1.5 "SF Mono",ui-monospace,Menlo,Consolas,monospace;color:var(--ink)}
  code{font:13px/1.4 "SF Mono",ui-monospace,Menlo,Consolas,monospace;background:var(--panel-2);
    padding:1px 5px;border-radius:5px}
  pre code{background:none;padding:0}
  .diagram{display:block;margin:14px auto;max-width:100%}
  .note{border-left:3px solid var(--accent);padding:6px 0 6px 14px;color:var(--muted);margin:12px 0}
  .check{background:var(--panel-2);border:1px dashed var(--line);border-radius:10px;padding:14px;margin-top:16px}
  .check .q{font-weight:600;margin-bottom:10px}
  textarea,input[type=text]{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;font:14px/1.5 inherit;resize:vertical}
  textarea{min-height:84px}
  .opts label{display:block;background:var(--bg);border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;margin:6px 0;cursor:pointer}
  .opts input{margin-right:9px}
  button{font:inherit;font-weight:600;border:none;border-radius:10px;padding:10px 16px;cursor:pointer;
    background:var(--accent);color:var(--accent-ink)}
  button.ghost{background:var(--panel-2);color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .nav{display:flex;justify-content:space-between;gap:10px;margin-top:6px}
  .feedback{margin-top:10px;font-size:14px}
  .feedback.ok{color:var(--good)} .feedback.no{color:var(--warn)}
  .quiz-item{border-top:1px solid var(--line);padding-top:16px;margin-top:16px}
  .quiz-item:first-child{border-top:none;margin-top:0;padding-top:0}
  .qprompt{font-weight:600;margin:6px 0 10px}
  #grade-status{margin-top:14px;font-size:14px;color:var(--muted);white-space:pre-wrap}
  .grade-box{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:14px;display:none}
  .hidden{display:none}
  .pill{font-size:11px;color:var(--muted)}
  details{margin-top:10px} summary{cursor:pointer;color:var(--accent);font-weight:600}
  .rubric{font-size:13px;color:var(--muted)}
  footer{color:var(--muted);font-size:12px;text-align:center;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header class="lh">
    <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
      <path d="M2 26 L11 9 L17 19 L21 12 L30 26 Z" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linejoin="round"/>
    </svg>
    <div>
      <div class="eyebrow">Peak Fettle · Codebase Curriculum</div>
    </div>
  </header>
  <h1 id="lesson-title">{{LESSON_TITLE}}</h1>
  <div class="sub" id="lesson-sub">{{LESSON_SUBTITLE}}</div>
  <div class="progress"><i id="bar"></i></div>

  <main id="stage"><!-- sections render here --></main>

  <div class="nav">
    <button class="ghost" id="prev" onclick="PF.prev()">← Back</button>
    <button id="next" onclick="PF.next()">Next →</button>
  </div>

  <footer>Self-paced · your answers stay in this page until you choose to grade them.</footer>
</div>

<!-- ========================================================================
     >>> FILL <<<  (1 of 3)  LESSON_META
     ===================================================================== -->
<script id="lesson-meta">
const LESSON_META = {
  id: "{{L##}}",
  title: "{{Lesson Title}}",
  subtitle: "{{Track # — name · ~30 min · prereqs: L0x}}",
};
</script>

<!-- ========================================================================
     >>> FILL <<<  (2 of 3)  SECTIONS  (segmenting — one concept per card)
     Each section: { title, html, check? }
       html  : the teaching content (string of HTML; use <pre><code> for code,
               <svg class="diagram"> for dual-coding diagrams).
       check : OPTIONAL embedded retrieval gate the learner must answer to advance.
               - free-text: { prompt, type:"free" }            (any non-empty answer unlocks)
               - multiple-choice: { prompt, type:"mc",
                   options:[...], answerIndex:N, why:"feedback shown after commit" }
     Keep each card to ONE idea (Mayer's segmenting). No decorative media.
     ===================================================================== -->
<script id="lesson-sections">
const SECTIONS = [
  {
    title: "Example section — replace me",
    html: `
      <p>Concept-first explanation in plain English with an analogy.</p>
      <h3>Now the real code</h3>
      <pre><code>// paste the actual snippet from the source file here</code></pre>
      <p class="note">Why it's built this way (elaboration hook).</p>
    `,
    check: {
      prompt: "Retrieval check: in one line, why is X done this way?",
      type: "free"
    }
  },
  {
    title: "Example MC gate",
    html: `<p>Another single idea, with a diagram:</p>
      <svg class="diagram" viewBox="0 0 320 80"><rect x="8" y="20" width="120" height="40" rx="8" fill="none" stroke="var(--accent)" stroke-width="2"/><text x="68" y="45" fill="var(--ink)" font-size="12" text-anchor="middle">noun</text></svg>`,
    check: {
      prompt: "Which statement is true?",
      type: "mc",
      options: ["Option A", "Option B (correct)", "Option C"],
      answerIndex: 1,
      why: "B is correct because ..."
    }
  }
];
</script>

<!-- ========================================================================
     >>> FILL <<<  (3 of 3)  QUIZ  (Bloom L1–L5; ≥1 L2, ≥2 of {L3,L4}, ≥2 L5)
     Each item: { id, bloom, type:"free"|"mc", prompt, points,
                  rubric:[...], model_answer,
                  options?, answerIndex? }   (options/answerIndex only for mc)
     L4/L5/L6 rubrics MUST grade reasoning quality, not keyword matching.
     ===================================================================== -->
<script id="lesson-quiz">
const QUIZ = [
  { id:"q1", bloom:2, type:"free", points:10,
    prompt:"(Understand) In your own words, explain ...",
    rubric:["Restates the idea accurately in own words","Names the key term"],
    model_answer:"A solid answer says ..." },
  { id:"q2", bloom:5, type:"free", points:20,
    prompt:"(Evaluate) Defend or refute <a real Peak Fettle decision> ...",
    rubric:["Takes a clear position","Cites the specific code/decision","Engages the counter-case for full marks"],
    model_answer:"A strong answer argues ... and acknowledges that ..." }
];
</script>

<!-- ========================================================================
     >>> OPTIONAL <<<  custom interactive widget for THIS lesson.
     Leave as-is if not needed. To add a widget, define
     window.__registerWidgets = function(PF){ PF.mountWidget(idx, fn); ... };
     The engine calls it after PF is defined and before the first render, so
     script ordering never matters. `fn(stage)` runs whenever section `idx`
     is shown — populate a placeholder element you put in that section's html.
     ===================================================================== -->
<script id="custom-widget">
/* Example (delete if unused):
window.__registerWidgets = function(PF){
  PF.mountWidget(0, function(stage){
    const host = document.getElementById('my-widget-mount'); // an element in section 0's html
    if (host) host.textContent = 'live widget here';
  });
};
*/
</script>

<!-- ========================================================================
     >>> ENGINE — DO NOT EDIT BELOW THIS LINE <<<
     ===================================================================== -->
<script>
const PF = (function(){
  let i = 0;                       // current section index
  const answers = {};              // section check answers (for gating only)
  const committed = {};            // which section checks have been committed
  const quizAnswers = {};
  const LS_KEY = 'pf_lesson_' + (LESSON_META.id || 'x');          // quiz responses
  const stage = document.getElementById('stage');
  const bar = document.getElementById('bar');
  const nextBtn = document.getElementById('next');
  const prevBtn = document.getElementById('prev');
  const TOTAL = SECTIONS.length + 1; // +1 for the quiz screen

  document.getElementById('lesson-title').textContent = LESSON_META.title || document.getElementById('lesson-title').textContent;
  document.getElementById('lesson-sub').textContent = LESSON_META.subtitle || '';
  document.title = "Peak Fettle Lesson · " + (LESSON_META.title||"");

  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function renderSection(idx){
    const s = SECTIONS[idx];
    let html = `<div class="card"><span class="pill">Section ${idx+1} of ${SECTIONS.length}</span>
      <h2>${esc(s.title)}</h2><div class="body">${s.html}</div>`;
    if (s.check){
      const c = s.check;
      html += `<div class="check"><div class="q">🧠 ${esc(c.prompt)}</div>`;
      if (c.type === 'mc'){
        html += `<div class="opts" id="opts">`;
        c.options.forEach((o,k)=>{ html += `<label><input type="radio" name="chk" value="${k}"> ${esc(o)}</label>`; });
        html += `</div><button class="ghost" onclick="PF.commit(${idx})">Check & continue</button>`;
      } else {
        html += `<textarea id="chkfree" placeholder="Type your answer — then commit to continue"></textarea>
                 <button class="ghost" onclick="PF.commit(${idx})" style="margin-top:8px">Commit answer</button>`;
      }
      html += `<div class="feedback" id="chkfb"></div></div>`;
    }
    html += `</div>`;
    stage.innerHTML = html;
    runCustomWidgetFor(idx);
    updateNav();
  }

  function commit(idx){
    const c = SECTIONS[idx].check;
    const fb = document.getElementById('chkfb');
    if (c.type === 'mc'){
      const sel = document.querySelector('input[name=chk]:checked');
      if (!sel){ fb.className='feedback no'; fb.textContent='Pick an option first.'; return; }
      const ok = (+sel.value === c.answerIndex);
      answers[idx]=+sel.value; committed[idx]=true;
      fb.className = 'feedback ' + (ok?'ok':'no');
      fb.textContent = (ok?'✓ Correct. ':'✗ Not quite. ') + (c.why||'');
    } else {
      const v = (document.getElementById('chkfree').value||'').trim();
      if (v.length < 2){ fb.className='feedback no'; fb.textContent='Write a little more, then commit.'; return; }
      answers[idx]=v; committed[idx]=true;
      fb.className='feedback ok'; fb.textContent='✓ Committed. Retrieval beats re-reading — onward.';
    }
    updateNav();
  }

  function renderQuiz(){
    let html = `<div class="card"><span class="pill">Graded quiz · Bloom L1–L5</span>
      <h2>Show what you know</h2>
      <p class="sub" style="margin-top:-2px">Answer all items, then grade with Claude. L4/L5 are scored on the quality of your reasoning, not keywords.</p>`;
    QUIZ.forEach(q=>{
      html += `<div class="quiz-item"><div class="qprompt">
        <span class="badge ${q.bloom>=5?'b5':''}">Bloom L${q.bloom}</span>
        <span class="pill"> · ${q.points} pts</span><br>${esc(q.prompt)}</div>`;
      if (q.type==='mc'){
        html += `<div class="opts">`;
        q.options.forEach((o,k)=>{ html += `<label><input type="radio" name="${q.id}" value="${k}"> ${esc(o)}</label>`; });
        html += `</div>`;
      } else {
        html += `<textarea data-q="${q.id}" placeholder="Your answer..."></textarea>`;
      }
      html += `</div>`;
    });
    html += `<div style="margin-top:18px;display:flex;gap:10px;flex-wrap:wrap">
        <button onclick="PF.grade()">⚡ Grade with Claude</button>
        <button class="ghost" onclick="PF.copyPrompt()">Copy grading prompt</button>
        <button class="ghost" onclick="PF.toggleRubric()">Show rubric & model answers</button>
      </div>
      <div id="grade-status"></div>
      <div class="grade-box" id="grade-box"></div>
      <div class="grade-box" id="rubric-box"></div>
      </div>`;
    stage.innerHTML = html;
    hydrateQuiz();
    updateNav();
  }

  function hydrateQuiz(){
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){}
    QUIZ.forEach(function(q){
      const v = saved[q.id];
      if (v != null){
        if (q.type === 'mc'){
          const idx = q.options.indexOf(v);
          if (idx >= 0){ const r = document.querySelector('input[name='+q.id+'][value="'+idx+'"]'); if (r) r.checked = true; }
        } else {
          const ta = document.querySelector('textarea[data-q='+q.id+']');
          if (ta) ta.value = v;
        }
      }
      if (q.type === 'mc'){
        const els = document.querySelectorAll('input[name='+q.id+']');
        els && els.forEach && els.forEach(function(el){ el.addEventListener('change', persistQuiz); });
      } else {
        const ta = document.querySelector('textarea[data-q='+q.id+']');
        if (ta) ta.addEventListener('input', persistQuiz);
      }
    });
  }

  function persistQuiz(){
    collectQuiz();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
  }

  function collectQuiz(){
    QUIZ.forEach(q=>{
      if (q.type==='mc'){
        const sel = document.querySelector(`input[name=${q.id}]:checked`);
        quizAnswers[q.id] = sel ? q.options[+sel.value] : "(no answer)";
      } else {
        const ta = document.querySelector(`textarea[data-q=${q.id}]`);
        quizAnswers[q.id] = (ta && ta.value.trim()) || "(no answer)";
      }
    });
  }

  function buildGradingPrompt(){
    collectQuiz();
    let p = `You are grading a learner (Arvin) on the Peak Fettle codebase curriculum lesson "${LESSON_META.title}" (${LESSON_META.id}).\n`;
    p += `Grade each item against its rubric. Award PARTIAL credit. For Bloom L4/L5/L6 items, grade the QUALITY OF REASONING — a clear, evidence-backed, counter-case-aware argument scores full marks even if it differs from the model answer; do NOT keyword-match. Give specific, kind, actionable feedback per item. End with: total score /${QUIZ.reduce((a,q)=>a+q.points,0)}, the Bloom levels that look strong vs. weak, and one misconception to revisit. Then remind me to update the LEARNER PROFILE in teacher_skill.md.\n\n`;
    QUIZ.forEach((q,n)=>{
      p += `--- Item ${n+1} (${q.id}, Bloom L${q.bloom}, ${q.points} pts) ---\n`;
      p += `Question: ${q.prompt}\n`;
      p += `Rubric: ${(q.rubric||[]).map((r,k)=>`(${k+1}) ${r}`).join(' ')}\n`;
      p += `Reference/model answer: ${q.model_answer||'(none)'}\n`;
      p += `Arvin's answer: ${quizAnswers[q.id]}\n\n`;
    });
    return p;
  }

  async function grade(){
    const status = document.getElementById('grade-status');
    const box = document.getElementById('grade-box');
    const prompt = buildGradingPrompt();
    // Channel (a): Cowork bridge
    if (window.cowork && typeof window.cowork.askClaude === 'function'){
      status.textContent = 'Grading with Claude…';
      try{
        const res = await window.cowork.askClaude(prompt, []);
        const text = (typeof res === 'string') ? res : (res && (res.text||res.content||JSON.stringify(res)));
        box.style.display='block';
        box.innerHTML = `<strong>Claude's grade</strong><div style="white-space:pre-wrap;margin-top:8px">${esc(text)}</div>`;
        status.textContent = '';
        return;
      }catch(e){
        status.textContent = 'Bridge grading failed ('+e.message+'). Falling back to clipboard.';
      }
    }
    // Channel (b): clipboard fallback
    copyPrompt(true);
  }

  function copyPrompt(fromGrade){
    const status = document.getElementById('grade-status');
    const prompt = buildGradingPrompt();
    try { localStorage.setItem(LS_KEY, JSON.stringify(quizAnswers)); } catch(e){}
    showPrompt(prompt);   // ALWAYS render the prompt+answers so nothing is ever lost
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(prompt).then(function(){
        status.textContent = 'Copied to clipboard AND shown below — paste it into your Claude chat to be graded.';
      }).catch(function(){
        status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
      });
    } else {
      status.textContent = 'Your answers are saved and shown below — copy the box and paste it into your Claude chat to be graded.';
    }
  }
  function showPrompt(prompt){
    const box = document.getElementById('grade-box');
    box.style.display='block';
    box.innerHTML = `<strong>Copy this grading prompt into Claude:</strong>
      <textarea style="margin-top:8px" rows="10">${esc(prompt)}</textarea>`;
  }

  function toggleRubric(){
    const box = document.getElementById('rubric-box');
    if (box.style.display==='block'){ box.style.display='none'; return; }
    let h = `<strong>Rubric & model answers (self-assess)</strong>`;
    QUIZ.forEach((q,n)=>{
      h += `<div style="margin-top:12px"><div class="pill">Item ${n+1} · Bloom L${q.bloom}</div>
        <div class="rubric"><em>Rubric:</em> ${(q.rubric||[]).map(esc).join(' · ')}</div>
        <div class="rubric"><em>Model:</em> ${esc(q.model_answer||'')}</div></div>`;
    });
    box.style.display='block'; box.innerHTML = h;
  }

  function updateNav(){
    bar.style.width = Math.round((i/(TOTAL-1))*100) + '%';
    prevBtn.disabled = (i===0);
    if (i >= SECTIONS.length){ nextBtn.classList.add('hidden'); }
    else {
      nextBtn.classList.remove('hidden');
      nextBtn.textContent = (i === SECTIONS.length-1) ? 'Go to quiz →' : 'Next →';
      // Gate: if this section has an uncommitted check, block advancing.
      const needsCheck = SECTIONS[i] && SECTIONS[i].check && !committed[i];
      nextBtn.disabled = !!needsCheck;
      nextBtn.title = needsCheck ? 'Answer the check to continue' : '';
    }
  }

  function render(){ if (i < SECTIONS.length) renderSection(i); else renderQuiz(); }
  function next(){ if (i < SECTIONS.length){ i++; render(); window.scrollTo(0,0); } }
  function prev(){ if (i>0){ i--; render(); window.scrollTo(0,0); } }

  // Custom widget hook: lessons may register per-section mount fns.
  const widgetMounts = {};
  function mountWidget(idx, fn){ widgetMounts[idx]=fn; }
  function runCustomWidgetFor(idx){ if (widgetMounts[idx]) try{ widgetMounts[idx](stage); }catch(e){console.warn(e);} }

  return { next, prev, commit, grade, copyPrompt, toggleRubric, mountWidget,
           _boot:function(){ render(); } };
})();
</script>
<script>
/* register custom widgets (if any), then boot — so mounts exist before render. */
if (window.__registerWidgets) window.__registerWidgets(PF);
PF._boot();
</script>
</body>
</html>
